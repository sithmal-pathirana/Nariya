<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nariya</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="header-left">
        <img src="../../icons/icon48.png" alt="Nariya" class="logo">
        <h1>Nariya</h1>
      </div>
      <div class="header-right">
        <label class="toggle-switch" title="Global Enable/Disable">
          <input type="checkbox" id="globalToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value" id="activeCount">0</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="interceptedCount">0</span>
        <span class="stat-label">Intercepted</span>
      </div>
    </div>

    <!-- Rules List -->
    <div class="rules-section">
      <div class="section-header">
        <h2>Active Rules</h2>
        <button id="addRuleBtn" class="btn-icon" title="Add Rule">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </div>
      <div id="rulesList" class="rules-list">
        <div class="empty-state">No rules configured</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button id="openDashboard" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" />
          <rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" />
          <rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" />
          <rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5" />
        </svg>
        Open Dashboard
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
